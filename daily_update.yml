name: Daily DevSync Update

on:
  schedule:
    # Runs at 04:30 UTC every day
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  update-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Activity Log for 23f2000137@ds.study.iitm.ac.in
        run: |
          echo "Last activity: $(date)" > activity_log.txt
          git config --global user.name "DevSync Automation"
          git config --global user.email "23f2000137@ds.study.iitm.ac.in"
          git add activity_log.txt
          git commit -m "Automated daily update for DevSync [skip ci]"
          git push
